name: Compile Check

on:
  push:
    branches: [master, feat/conversation-recall]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: latest

      - name: Gradle cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Compile debug Kotlin and run focused regression tests
        run: |
          chmod +x gradlew
          ./gradlew compileDebugKotlin :app:testDebugUnitTest \
            --tests 'me.rerere.rikkahub.data.ai.GenerationHandlerToolCallTimeoutTest' \
            --tests 'me.rerere.rikkahub.data.preferences.TermuxDefaultsTest' \
            --tests 'me.rerere.rikkahub.data.preferences.TermuxRuntimeWiringTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxSessionToolTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxJobProtocolTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxFileProtocolTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxFileShellSimulationTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxTransferProtocolTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxWriteShellSimulationTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxEditEngineTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxEditProtocolTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.local.TermuxEditShellSimulationTest' \
            --tests 'me.rerere.rikkahub.ui.components.message.tools.TermuxToolUIModelsTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.ToolSchemaArrayItemsTest' \
            --tests 'me.rerere.rikkahub.data.ai.tools.LocalToolsDescriptionTest' \
            --tests 'me.rerere.rikkahub.service.TelegramAgentContextTest' \
            --tests 'me.rerere.rikkahub.service.ConflateLatestTest' \
            --tests 'me.rerere.rikkahub.service.ChatServiceTest' \
            --tests 'me.rerere.rikkahub.data.model.CompactionTest' \
            --tests 'me.rerere.rikkahub.data.ai.CompactionSupportTest' \
            --tests 'me.rerere.rikkahub.costguards.TokenBudgetTrackerTest' \
            --tests 'me.rerere.rikkahub.data.ai.ParallelToolCallStreamingAssemblyTest' \
            --tests 'me.rerere.rikkahub.data.ai.GenerationStepBudgetTest' \
            --tests 'me.rerere.rikkahub.data.ai.LoopGuardTest' \
            --tests 'me.rerere.rikkahub.subagent.SubAgentStepBudgetTest' \
            --tests 'me.rerere.rikkahub.subagent.SubAgentRequestValidationTest' \
            --tests 'me.rerere.rikkahub.subagent.SubAgentCompletionWaitTest' \
            --tests 'me.rerere.rikkahub.subagent.SubAgentRegistryTest' \
            --tests 'me.rerere.rikkahub.reliability.GitHubReleaseCheckerTest' \
            --no-daemon --stacktrace
          ./gradlew :ai:testDebugUnitTest \
            --tests 'me.rerere.ai.provider.providers.StreamedToolCallIdResolverTest' \
            --tests 'me.rerere.ai.provider.providers.LosslessCallbackFlowTest' \
            --tests 'me.rerere.ai.provider.providers.openai.ChatCompletionsParallelToolImageOrderingTest' \
            --tests 'me.rerere.ai.provider.providers.openai.ResponseAPIParallelToolImageOrderingTest' \
            --tests 'me.rerere.ai.core.InputSchemaSerializationTest' \
            --no-daemon --stacktrace

      - name: Upload build report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compile-error-report
          path: |
            **/build/reports/
            **/build/outputs/logs/
          retention-days: 7
