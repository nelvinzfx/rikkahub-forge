name: Compile Check

on:
  push:
    branches: [master, feat/conversation-recall]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up bun
        uses: oven-sh/setup-bun@v2

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Compile debug Kotlin
        run: |
          chmod +x gradlew
          ./gradlew compileDebugKotlin --no-daemon --stacktrace

      - name: Upload build report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compile-error-report
          path: |
            **/build/reports/
            **/build/outputs/logs/
          retention-days: 7
